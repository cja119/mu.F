
evaluation_mode: 
  backward: jax-pmap #serial 
  cost_to_go: ray

backward_coupling_solver: box_constrained_nlp
forward_coupling_solver: general_constrained_nlp

forward_general_constraints: false


standardised: True

backward_coupling:
  n_starts: 4
  jax_opt_options:
    error_tol: 1e-6
    ftol0: 0.001
    ftol_increment: 0.01
    augmented_grad_tol: 0.01
    augmented_constr_tol: 0.01
    ftol_min: 0.00001
    augmented_obj_tol: 0.001
  casadi_ipopt_options:
    maxiter: 500
    verbose: False
    tol: 1e-6
    options:
      verbose: 0
      maxiter: 1000
      disp: False
  
forward_coupling:
  max_solution_time: 1. 
  parallelised: True
  penalty_method: False
  n_starts: 4
  n_rejects: 10
  rejection_margin: 10
  casadi_ipopt_options:
    maxiter: 500
    verbose: False
    tol: 1e-6
    options:
      verbose: 0
      maxiter: 1000
      disp: False

post:
  n_starts:   10
  jax_opt_options:
    error_tol: 1e-6
    ftol0: 0.001
    ftol_increment: 0.01
    augmented_grad_tol: 0.01
    augmented_constr_tol: 0.01
    ftol_min: 0.00001
    augmented_obj_tol: 0.001